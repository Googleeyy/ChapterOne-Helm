{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
  namespace: {{ .Values.global.namespace }}
  labels:
    app: library-e2e
    component: gateway
spec:
  parentRefs:
    - name: library-e2e-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/books
      backendRefs:
        - name: book-service
          namespace: {{ .Values.global.namespace }}
          port: 8081
      timeouts:
        request: 30s
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user-service
          namespace: {{ .Values.global.namespace }}
          port: 8082
      timeouts:
        request: 30s
    - matches:
        - path:
            type: PathPrefix
            value: /api/borrows
      backendRefs:
        - name: borrow-service
          namespace: {{ .Values.global.namespace }}
          port: 8083
      timeouts:
        request: 30s
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: book-service
          namespace: {{ .Values.global.namespace }}
          port: 8081
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: {{ .Values.global.namespace }}
  labels:
    app: library-e2e
    component: gateway
spec:
  parentRefs:
    - name: library-e2e-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Path
                value: /
      backendRefs:
        - name: frontend
          namespace: {{ .Values.global.namespace }}
          port: 80
{{- end }}
