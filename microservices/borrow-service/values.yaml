# Borrow Service Subchart Values
# These values are overridden by the parent chart's values.yaml

global:
  appName: library-e2e
  namespace: chapterone
  imagePullPolicy: IfNotPresent

mongodb:
  name: mongo
  primaryHost: mongo
  port: 27017

bookService:
  name: book-service
  port: 8081

userService:
  name: user-service
  port: 8082

borrowService:
  name: borrow-service
  secretName: borrow-service-secret
  routePrefix: /api/borrows
  healthPath: /api-docs
  image:
    repository: googleyy/borrow-service
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8083
  database:
    name: chapterone_borrows
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: false
