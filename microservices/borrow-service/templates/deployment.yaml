apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.borrowService.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.borrowService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.borrowService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.borrowService.name }}
    spec:
      containers:
        - name: {{ .Values.borrowService.name }}
          image: "{{ .Values.borrowService.image.repository }}:{{ .Values.borrowService.image.tag }}"
          imagePullPolicy: {{ .Values.borrowService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.borrowService.port }}
          env:
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.borrowService.name }}-config
                  key: MONGO_URI
            - name: BOOK_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.borrowService.name }}-config
                  key: BOOK_SERVICE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.borrowService.name }}-config
                  key: USER_SERVICE_URL
          readinessProbe:
            tcpSocket:
              port: {{ .Values.borrowService.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.borrowService.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
