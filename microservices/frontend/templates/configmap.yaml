apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.frontend.name }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.frontend.name }}
data:
  APP_NAME: "Frontend"
  HOST: "0.0.0.0"
  PORT: "{{ .Values.frontend.port }}"
  API_BASE_URL: "{{ .Values.frontend.apiBaseUrl }}"
