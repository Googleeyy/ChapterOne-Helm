# User Service Subchart Values
# These values are overridden by the parent chart's values.yaml

global:
  appName: library-e2e
  namespace: chapterone
  imagePullPolicy: IfNotPresent

mongodb:
  name: mongo
  primaryHost: mongo
  port: 27017

borrowService:
  name: borrow-service
  port: 8083

userService:
  name: user-service
  secretName: user-service-secret
  routePrefix: /api/users
  healthPath: /actuator/health
  image:
    repository: googleyy/user-service
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8082
  database:
    name: chapterone_users
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
