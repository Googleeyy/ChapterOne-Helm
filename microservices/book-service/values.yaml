# ──────────────────────────────────────────────────────────────
# FALLBACK DEFAULTS — DO NOT EDIT HERE.
# The umbrella chart (values.yaml / values-dev.yaml / values-prod.yaml)
# is the single source of truth and overrides everything below.
# These values exist only so Helm templates render successfully.
# ──────────────────────────────────────────────────────────────

global:
  appName: library-e2e
  namespace: chapterone
  imagePullPolicy: IfNotPresent

mongodb:
  name: mongodb
  primaryHost: mongodb-0.mongodb
  port: 27017

bookService:
  name: book-service
  secretName: book-service-secret
  routePrefix: /api/books
  healthPath: /api/books
  image:
    repository: googleyy/chapterone-book
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8081
  database:
    name: chapterone_books
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: false
