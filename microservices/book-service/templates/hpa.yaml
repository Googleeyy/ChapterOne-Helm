{{- if .Values.bookService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.bookService.name }}-hpa
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.bookService.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.bookService.name }}
  minReplicas: {{ .Values.bookService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.bookService.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.bookService.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
