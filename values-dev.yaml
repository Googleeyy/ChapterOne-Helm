# Development environment values
# Namespace: library-dev
# Lower resource limits, fewer replicas, dev-specific configurations

global:
  appName: library-e2e
  namespace: library-dev
  imagePullSecrets: []
  imagePullPolicy: IfNotPresent
  environment: dev
createNamespace: true
gateway:
  name: library-gateway
  namespace: library-dev
  gatewayClassName: kgateway
  listener:
    name: http
    port: 80
  enabled: true
  host: "library-dev.local"
  tls:
    enabled: false
    secretName: ""
mongodb:
  name: mongodb
  secretName: mongodb-secret
  primaryHost: mongodb-0.mongodb
  image:
    repository: mongo
    tag: "7.0"
    pullPolicy: IfNotPresent
  port: 27017
  storage:
    size: "1Gi"
    storageClass: "nfs-client"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"
bookService:
  name: book-service
  secretName: book-service-secret
  routePrefix: /api/books
  healthPath: /api/books
  image:
    repository: googleyy/chapterone-book
    tag: dev-bb5c906
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8081
  database:
    name: chapterone_books_dev
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  autoscaling:
    enabled: false
userService:
  name: user-service
  secretName: user-service-secret
  routePrefix: /api/users
  healthPath: /actuator/health
  image:
    repository: googleyy/chapterone-user
    tag: dev-97a1bba
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8082
  database:
    name: chapterone_users_dev
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  autoscaling:
    enabled: false
borrowService:
  name: borrow-service
  secretName: borrow-service-secret
  routePrefix: /api/borrows
  healthPath: /api-docs
  image:
    repository: googleyy/chapterone-borrow
    tag: dev-97e80d5
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8083
  database:
    name: chapterone_borrows_dev
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  autoscaling:
    enabled: false
frontend:
  name: frontend
  routePrefix: /
  image:
    repository: googleyy/chapterone-frontend
    tag: dev-899cf5d
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  apiBaseUrl: "http://library-dev.local"
  resources:
    requests:
      cpu: "25m"
      memory: "32Mi"
    limits:
      cpu: "50m"
      memory: "64Mi"
  autoscaling:
    enabled: false
haproxy:
  enabled: false
  replicaCount: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
networkPolicy:
  enabled: true

monitoring:
  enabled: true
  namespace: library-dev

  # Prometheus Configuration
  prometheus:
    enabled: true
    prometheusSpec:
      retention: 7d
      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: "nfs-client"
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: "5Gi"
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector: {}
      podMonitorSelectorNilUsesHelmValues: false
      podMonitorSelector: {}

  # Grafana Configuration
  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: "10.3.3"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    persistence:
      enabled: true
      storageClassName: "nfs-client"
      accessModes: ["ReadWriteOnce"]
      size: "2Gi"
    adminPassword: "admin"
    service:
      type: ClusterIP
      port: 3000
    ingress:
      enabled: false
    grafana.ini:
      server:
        root_url: http://localhost:3000
      auth.anonymous:
        enabled: false
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'default'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
    dashboards:
      default:
        # Kubernetes Cluster Overview
        kubernetes-cluster:
          gnetId: 7249
          revision: 1
          datasource: Prometheus
        # Node Exporter Full
        node-exporter:
          gnetId: 1860
          revision: 29
          datasource: Prometheus
        # Pods Overview
        pods:
          gnetId: 6417
          revision: 1
          datasource: Prometheus

  # Node Exporter for system metrics
  nodeExporter:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "64Mi"

  # Kubernetes Metrics Server
  kubeStateMetrics:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"

secrets:
  - name: mongodb-secret
    data:
    # No authentication - using simple URI
  - name: book-service-secret
    data:
    # No MongoDB credentials needed - using simple URI
  - name: user-service-secret
    data:
      # No MongoDB credentials needed - using simple URI
      JWT_SECRET: "dev-jwt-secret-not-for-production"
  - name: borrow-service-secret
    data:
# No MongoDB credentials needed - using simple URI
