# Development environment values
# Namespace: library-dev
# Lower resource limits, fewer replicas, dev-specific configurations

global:
  appName: library-e2e
  namespace: library-dev
  imagePullSecrets: []
  imagePullPolicy: IfNotPresent
  environment: dev
createNamespace: true
gateway:
  name: library-gateway
  namespace: library-dev
  gatewayClassName: kgateway
  listener:
    name: http
    port: 80
  enabled: true
  host: "library-dev.local"
  tls:
    enabled: false
    secretName: ""
mongodb:
  name: mongodb
  secretName: mongodb-secret
  primaryHost: mongodb-0.mongodb
  image:
    repository: mongo
    tag: "7.0"
    pullPolicy: IfNotPresent
  port: 27017
  storage:
    size: "1Gi"
    storageClass: "nfs-client"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"
bookService:
  name: book-service
  secretName: book-service-secret
  routePrefix: /api/books
  healthPath: /api/books
  image:
    repository: googleyy/chapterone-book
    tag: dev-c7f991f
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8081
  database:
    name: chapterone_books_dev
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  autoscaling:
    enabled: false
userService:
  name: user-service
  secretName: user-service-secret
  routePrefix: /api/users
  healthPath: /actuator/health
  image:
    repository: googleyy/chapterone-user
    tag: dev-ae52bf1
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8082
  database:
    name: chapterone_users_dev
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  autoscaling:
    enabled: false
borrowService:
  name: borrow-service
  secretName: borrow-service-secret
  routePrefix: /api/borrows
  healthPath: /api-docs
  image:
    repository: googleyy/chapterone-borrow
    tag: dev-882f658
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8083
  database:
    name: chapterone_borrows_dev
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  autoscaling:
    enabled: false
frontend:
  name: frontend
  routePrefix: /
  image:
    repository: googleyy/chapterone-frontend
    tag: dev-ac269f2
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  apiBaseUrl: ""
  resources:
    requests:
      cpu: "25m"
      memory: "32Mi"
    limits:
      cpu: "50m"
      memory: "64Mi"
  autoscaling:
    enabled: false
haproxy:
  enabled: false
  replicaCount: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
networkPolicy:
  enabled: false
secrets:
  - name: mongodb-secret
    data:
    # No authentication - using simple URI
  - name: book-service-secret
    data:
    # No MongoDB credentials needed - using simple URI
  - name: user-service-secret
    data:
      # No MongoDB credentials needed - using simple URI
      JWT_SECRET: "dev-jwt-secret-not-for-production"
  - name: borrow-service-secret
    data:
# No MongoDB credentials needed - using simple URI
