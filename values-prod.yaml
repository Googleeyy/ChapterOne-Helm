# Production environment values
# Namespace: library-prod
# Higher resource limits, more replicas, production-specific configurations

global:
  appName: library-e2e
  namespace: library-prod
  imagePullSecrets: []
  imagePullPolicy: IfNotPresent
  environment: prod
createNamespace: true
gateway:
  name: library-gateway
  namespace: library-prod
  gatewayClassName: kgateway
  listener:
    name: http
    port: 80
  enabled: true
  host: "library.local"
  tls:
    enabled: true
    secretName: "library-tls-secret"
mongodb:
  name: mongodb
  secretName: mongodb-secret
  primaryHost: mongodb-0.mongodb
  image:
    repository: mongo
    tag: "7.0"
    pullPolicy: IfNotPresent
  port: 27017
  storage:
    size: "10Gi"
    storageClass: "nfs-client"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
bookService:
  name: book-service
  secretName: book-service-secret
  routePrefix: /api/books
  healthPath: /api/books
  image:
    repository: googleyy/chapterone-book
    tag: "v0.0.1"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8081
  database:
    name: chapterone_books
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: false
userService:
  name: user-service
  secretName: user-service-secret
  routePrefix: /api/users
  healthPath: /actuator/health
  image:
    repository: googleyy/chapterone-user
    tag: "v0.1.2"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8082
  database:
    name: chapterone_users
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: false
borrowService:
  name: borrow-service
  secretName: borrow-service-secret
  routePrefix: /api/borrows
  healthPath: /api-docs
  image:
    repository: googleyy/chapterone-borrow
    tag: "v0.0.3"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8083
  database:
    name: chapterone_borrows
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: false
frontend:
  name: frontend
  routePrefix: /
  image:
    repository: googleyy/chapterone-frontend
    tag: "v0.0.6"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  apiBaseUrl: "http://library.local"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
haproxy:
  enabled: false
  replicaCount: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
networkPolicy:
  enabled: false

secrets:
  - name: mongodb-secret
    data:
    # No authentication - using simple URI
  - name: book-service-secret
    data:
    # No MongoDB credentials needed - using simple URI
  - name: user-service-secret
    data:
      # No MongoDB credentials needed - using simple URI
      JWT_SECRET: "CHANGE-THIS-TO-A-SECURE-PRODUCTION-SECRET"
  - name: borrow-service-secret
    data:
# No MongoDB credentials needed - using simple URI
