# Production environment values
# Namespace: library-prod
# Higher resource limits, more replicas, production-specific configurations

global:
  appName: library-e2e
  namespace: library-prod
  imagePullSecrets: []
  imagePullPolicy: IfNotPresent
  environment: prod

createNamespace: true

gateway:
  name: library-gateway
  namespace: library-prod
  gatewayClassName: kgateway
  listener:
    name: http
    port: 80
  enabled: true
  host: "library.local"
  tls:
    enabled: true
    secretName: "library-tls-secret"

mongodb:
  name: mongodb
  secretName: mongodb-secret
  primaryHost: mongodb-0.mongodb
  image:
    repository: mongo
    tag: "7.0"
    pullPolicy: IfNotPresent
  port: 27017
  storage:
    size: "10Gi"
    storageClass: "nfs-client"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

bookService:
  name: book-service
  secretName: book-service-secret
  routePrefix: /api/books
  healthPath: /api/books
  image:
    repository: googleyy/chapterone-book
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  replicas: 3
  port: 8081
  database:
    name: chapterone_books
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

userService:
  name: user-service
  secretName: user-service-secret
  routePrefix: /api/users
  healthPath: /actuator/health
  image:
    repository: googleyy/user-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  replicas: 3
  port: 8082
  database:
    name: chapterone_users
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

borrowService:
  name: borrow-service
  secretName: borrow-service-secret
  routePrefix: /api/borrows
  healthPath: /api-docs
  image:
    repository: googleyy/chapterone-borrow
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  replicas: 3
  port: 8083
  database:
    name: chapterone_borrows
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

frontend:
  name: frontend
  routePrefix: /
  image:
    repository: googleyy/chapterone-frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  replicas: 3
  port: 80
  apiBaseUrl: "http://library.local"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70

haproxy:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

networkPolicy:
  enabled: true

monitoring:
  enabled: true
  namespace: library-prod

  # Prometheus Configuration
  prometheus:
    enabled: true
    prometheusSpec:
      retention: 30d
      resources:
        requests:
          cpu: "1000m"
          memory: "1Gi"
        limits:
          cpu: "2000m"
          memory: "4Gi"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: "nfs-client"
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: "50Gi"
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector: {}
      podMonitorSelectorNilUsesHelmValues: false
      podMonitorSelector: {}

  # Grafana Configuration
  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: "10.3.3"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    persistence:
      enabled: true
      storageClassName: "nfs-client"
      accessModes: ["ReadWriteOnce"]
      size: "10Gi"
    adminPassword: "CHANGE-THIS-IN-PRODUCTION"
    service:
      type: ClusterIP
      port: 3000
    ingress:
      enabled: true
      hosts:
        - grafana.library.local
      tls:
        - secretName: library-tls-secret
          hosts:
            - grafana.library.local
    grafana.ini:
      server:
        root_url: https://grafana.library.local
      auth.anonymous:
        enabled: false
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'default'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
    dashboards:
      default:
        # Kubernetes Cluster Overview
        kubernetes-cluster:
          gnetId: 7249
          revision: 1
          datasource: Prometheus
        # Node Exporter Full
        node-exporter:
          gnetId: 1860
          revision: 29
          datasource: Prometheus
        # Pods Overview
        pods:
          gnetId: 6417
          revision: 1
          datasource: Prometheus

  # Node Exporter for system metrics
  nodeExporter:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"

  # Kubernetes Metrics Server
  kubeStateMetrics:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

secrets:
  - name: mongodb-secret
    data:
      # No authentication - using simple URI
  - name: book-service-secret
    data:
      # No MongoDB credentials needed - using simple URI
  - name: user-service-secret
    data:
      # No MongoDB credentials needed - using simple URI
      JWT_SECRET: "CHANGE-THIS-TO-A-SECURE-PRODUCTION-SECRET"
  - name: borrow-service-secret
    data:
      # No MongoDB credentials needed - using simple URI
