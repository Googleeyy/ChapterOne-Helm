apiVersion: v2
name: library-e2e
description: A Helm chart for Library E2E platform - complete microservices deployment
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: mongodb
    condition: mongodb.enabled
    repository: file://./infrastructure/mongodb
    version: "1.0.0"
  - name: gateway
    condition: gateway.enabled
    repository: file://./infrastructure/gateway
    version: "1.0.0"
  - name: book-service
    condition: book-service.enabled
    repository: file://./microservices/book-service
    version: "1.0.0"
  - name: user-service
    condition: user-service.enabled
    repository: file://./microservices/user-service
    version: "1.0.0"
  - name: borrow-service
    condition: borrow-service.enabled
    repository: file://./microservices/borrow-service
    version: "1.0.0"
  - name: frontend
    condition: frontend.enabled
    repository: file://./microservices/frontend
    version: "1.0.0"
  - name: kube-prometheus-stack
    condition: monitoring.enabled
    repository: https://prometheus-community.github.io/helm-charts
    version: "55.5.0"
