name: Helm Validate

on:
  push:
    branches:
      - dev
      - production
  pull_request:
    branches:
      - dev
      - production
  workflow_dispatch:

jobs:
  lint-and-template:
    name: Lint & Template Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Update Helm Dependencies
        run: |
          cd helm
          helm dependency update

      - name: Lint Helm Chart (Dev)
        run: |
          cd helm
          helm lint . -f values-dev.yaml

      - name: Lint Helm Chart (Prod)
        run: |
          cd helm
          helm lint . -f values-prod.yaml

      - name: Template Helm Chart (Dev)
        run: |
          cd helm
          helm template library-dev . -f values-dev.yaml --namespace library-dev > /dev/null

      - name: Template Helm Chart (Prod)
        run: |
          cd helm
          helm template library-prod . -f values-prod.yaml --namespace library-prod > /dev/null

      - name: Validate ArgoCD Application Manifests
        run: |
          # Basic YAML validation for ArgoCD manifests
          for file in argocd/applications/*.yaml; do
            echo "Validating $file"
            python3 -c "import yaml; yaml.safe_load(open('$file'))"
          done
