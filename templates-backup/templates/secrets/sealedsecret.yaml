{{- if .Values.secrets.sealedSecrets.enabled }}
# ============================================================================
# SealedSecret - Encrypted Secret for GitOps
# ============================================================================
# 
# NEVER commit raw Secret YAML to Git! 
# This file contains encrypted secrets that can only be decrypted by the 
# sealed-secrets controller in your cluster.
#
# To create a new sealed secret:
# 
# 1. Create raw secret (do NOT commit this):
#    kubectl create secret generic app-secrets \
#      --from-literal=JWT_SECRET=your-actual-jwt-secret \
#      --dry-run=client -o yaml > /tmp/raw-secrets.yaml
#
# 2. Encrypt with kubeseal:
#    kubeseal --controller-name={{ .Values.secrets.sealedSecrets.controllerName }} \
#             --controller-namespace={{ .Values.secrets.sealedSecrets.controllerNamespace }} \
#             --format yaml < /tmp/raw-secrets.yaml > helm/templates/secrets/sealedsecret.yaml
#
# 3. Delete raw secret:
#    rm /tmp/raw-secrets.yaml
#
# 4. Commit only the SealedSecret (this file) to Git
#
# The controller will decrypt this SealedSecret and create a regular Secret
# named 'app-secrets' in the target namespace.
# ============================================================================

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: app-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "library-e2e.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    # PLACEHOLDER: Replace with actual encrypted data from kubeseal
    # JWT_SECRET: AgBy... (base64-encoded encrypted value)
    JWT_SECRET: {{ .Values.userService.secrets.JWT_SECRET | b64enc | quote }}
  template:
    type: Opaque
    metadata:
      name: app-secrets
      namespace: {{ .Release.Namespace }}
      labels:
        {{- include "library-e2e.labels" . | nindent 8 }}
{{- end }}
