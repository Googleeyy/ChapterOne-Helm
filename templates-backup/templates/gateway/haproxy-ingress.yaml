{{- if .Values.haproxy.enabled }}
# ============================================================================
# HAProxy Ingress Controller
# ============================================================================
# 
# Traffic Flow:
#   External Request вҶ’ HAProxy (Load Balancer + SSL Offload) вҶ’ kGateway (HTTPRoute) вҶ’ Backend Services
#   
#                   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   Internet        в”Ӯ  HAProxy        в”Ӯ    L4 Load Balancer + TCP/SSL Offload
#      в”Ӯ            в”Ӯ  (Port 80/443)  в”Ӯ
#      в”Ӯ            в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#      в”Ӯ                     в”Ӯ
#      в”Ӯ            в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#      в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–әв”Ӯ  kGateway       в”Ӯ    L7 HTTP Routing (HTTPRoute)
#                   в”Ӯ  (Port 80)      в”Ӯ
#                   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#                            в”Ӯ
#              в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#              в”Ӯ             в”Ӯ             в”Ӯ
#      в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”җ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”җ в”Ңв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#      в”Ӯ Frontend   в”Ӯ в”Ӯ Backend    в”Ӯ в”Ӯ Backend   в”Ӯ
#      в”Ӯ (Port 80)  в”Ӯ в”Ӯ Services   в”Ӯ в”Ӯ Services  в”Ӯ
#      в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# This provides:
# - HAProxy: High-performance L4 load balancing, SSL termination, connection pooling
# - kGateway: Advanced L7 routing, traffic splitting, header manipulation, retries
# ============================================================================

apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: haproxy
  annotations:
    ingressclass.kubernetes.io/is-default-class: "false"
spec:
  controller: haproxy-ingress.github.io/controller

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "library-e2e.fullname" . }}-haproxy-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "library-e2e.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  annotations:
    # HAProxy specific annotations
    haproxy-ingress.github.io/timeout-connect: "5s"
    haproxy-ingress.github.io/timeout-client: "50s"
    haproxy-ingress.github.io/timeout-server: "50s"
    haproxy-ingress.github.io/maxconn: "2000"
    haproxy-ingress.github.io/balance-algorithm: "roundrobin"
    haproxy-ingress.github.io/ssl-redirect: "true"
    haproxy-ingress.github.io/forwardfor: "if_missing"
    # Rate limiting
    haproxy-ingress.github.io/rate-limit: "true"
    haproxy-ingress.github.io/rate-limit-expire: "1m"
    haproxy-ingress.github.io/rate-limit-interval: "10s"
spec:
  ingressClassName: haproxy
  rules:
    - host: {{ .Values.gateway.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "library-e2e.fullname" . }}-gateway  # Forward to kGateway
                port:
                  number: 80
  {{- if .Values.gateway.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.gateway.host }}
      secretName: {{ .Values.gateway.tls.secretName }}
  {{- end }}
{{- end }}
