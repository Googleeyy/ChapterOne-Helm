apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: library-root-chart-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: library-e2e
    app.kubernetes.io/component: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: library-e2e
  source:
    repoURL: https://github.com/Googleeyy/ChapterOne-Helm.git
    targetRevision: production
    path: .
    helm:
      releaseName: library-root-prod
      valueFiles:
        - values-prod.yaml
      values: |
        book-service:
          name: book-service
          secretName: book-service-secret
          routePrefix: /api/books
          healthPath: /api/books
          image:
            repository: googleyy/chapterone-book
            tag: "1.0.0"
            pullPolicy: IfNotPresent
          replicas: 3
          port: 8081
          database:
            name: chapterone_books
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          autoscaling:
            enabled: true
            minReplicas: 3
            maxReplicas: 10
            targetCPUUtilizationPercentage: 70
            targetMemoryUtilizationPercentage: 80
        user-service:
          name: user-service
          secretName: user-service-secret
          routePrefix: /api/users
          healthPath: /actuator/health
          image:
            repository: googleyy/chapterone-user
            tag: "1.0.0"
            pullPolicy: IfNotPresent
          replicas: 3
          port: 8082
          database:
            name: chapterone_users
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          autoscaling:
            enabled: true
            minReplicas: 3
            maxReplicas: 10
            targetCPUUtilizationPercentage: 70
            targetMemoryUtilizationPercentage: 80
        borrow-service:
          name: borrow-service
          secretName: borrow-service-secret
          routePrefix: /api/borrows
          healthPath: /api-docs
          image:
            repository: googleyy/chapterone-borrow
            tag: "1.0.0"
            pullPolicy: IfNotPresent
          replicas: 3
          port: 8083
          database:
            name: chapterone_borrows
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          autoscaling:
            enabled: true
            minReplicas: 3
            maxReplicas: 10
            targetCPUUtilizationPercentage: 70
            targetMemoryUtilizationPercentage: 80
  destination:
    server: https://kubernetes.default.svc
    namespace: library-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
